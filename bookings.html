<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookings — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="./admin-styles.css">
</head>
<body>

<div id="sidebar-overlay" class="sidebar-overlay"></div>

<div class="admin-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-name" id="sidebar-brand">Booking Admin</div>
      <div class="sidebar-brand-tag">Management Panel</div>
    </div>
    <nav class="sidebar-nav">
      <a href="./dashboard.html"><i class="fa-solid fa-gauge"></i> Dashboard</a>
      <a href="./bookings.html" class="active"><i class="fa-solid fa-calendar-check"></i> Bookings</a>
      <a href="./calendar.html"><i class="fa-solid fa-calendar-days"></i> Calendar</a>
      <a href="./blocking.html"><i class="fa-solid fa-ban"></i> Date Blocking</a>
      <a href="./units.html"><i class="fa-solid fa-building"></i> Units</a>
      <a href="./addons.html"><i class="fa-solid fa-circle-plus"></i> Add-ons</a>
      <a href="./amenities.html"><i class="fa-solid fa-star"></i> Amenities</a>
      <a href="./holiday-rates.html"><i class="fa-solid fa-tag"></i> Holiday Rates</a>
      <a href="./expenses.html"><i class="fa-solid fa-receipt"></i> Expenses</a>
      <a href="./design.html"><i class="fa-solid fa-palette"></i> Design</a>
      <a href="./settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
    </nav>
    <div class="sidebar-footer">
      <div class="admin-email" id="admin-email">—</div>
      <button class="btn-signout" id="signout-btn">
        <i class="fa-solid fa-right-from-bracket"></i> Sign Out
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content">
    <header class="page-header">
      <div class="page-header-left">
        <button class="mobile-menu-btn" id="mobile-menu-btn"><i class="fa-solid fa-bars"></i></button>
        <span class="page-title">Bookings</span>
      </div>
      <span class="badge" id="count-badge" style="background:#f1f5f9;color:var(--muted);">Loading…</span>
    </header>

    <div class="page-body">

      <!-- TOOLBAR -->
      <div class="card" style="margin-bottom:16px;">
        <div class="card-body" style="padding:16px 20px;">
          <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;">
            <!-- Filter tabs -->
            <div class="filter-tabs" id="filter-tabs">
              <button class="filter-tab active" data-filter="all">All</button>
              <button class="filter-tab" data-filter="pending_review">Pending</button>
              <button class="filter-tab" data-filter="confirmed">Confirmed</button>
              <button class="filter-tab" data-filter="rejected">Rejected</button>
              <button class="filter-tab" data-filter="cancelled">Cancelled</button>
            </div>
            <!-- Search -->
            <div class="search-bar" style="flex:1;min-width:200px;">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input type="text" id="search-input" class="form-control" placeholder="Search ref, guest, email, phone…">
            </div>
          </div>
        </div>
      </div>

      <!-- BOOKINGS TABLE -->
      <div class="card">
        <div id="bookings-container">
          <div class="loading-state"><span class="spinner"></span><p style="margin-top:8px;">Loading bookings…</p></div>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- ======================================================================
     BOOKING DETAIL MODAL
     ====================================================================== -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="booking-modal">

    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-ref">—</div>
        <div class="modal-subtitle" id="modal-created">—</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span id="modal-status-badge"></span>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
    </div>

    <div class="modal-body" id="modal-body">
      <!-- Dynamically filled -->
    </div>

    <div class="modal-actions" id="modal-actions">
      <!-- Dynamically filled based on status -->
    </div>

  </div>
</div>

<!-- Rejection reason panel (injected inside modal-actions) -->

<div class="toast-container" id="toast-container"></div>

<script type="module">
  import { requireAuth, adminSignOut, getAdminFirebase } from './admin-auth.js';
  import {
    collection, query, orderBy, limit, where, onSnapshot, doc, getDoc,
  } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  // Mobile sidebar
  document.getElementById('mobile-menu-btn').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('open');
  });
  document.getElementById('sidebar-overlay').addEventListener('click', () => {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
  });

  // --- Auth guard
  const { user, clientId } = await requireAuth();
  document.getElementById('admin-email').textContent = user.email;
  document.getElementById('signout-btn').addEventListener('click', adminSignOut);

  const { db } = getAdminFirebase();

  // Load brand name
  try {
    const pub = await getDoc(doc(db, 'clients', clientId, 'settings', 'public'));
    if (pub.exists() && pub.data().companyName) {
      document.getElementById('sidebar-brand').textContent = pub.data().companyName;
    }
  } catch (_) {}

  // ---- State ----
  let allBookings = [];     // full loaded set
  let currentFilter = 'all';
  let currentSearch  = '';
  let unsubscribe    = null;
  let currentBooking = null; // booking open in modal

  // Check URL params for deep-linking to a specific booking or filter
  const urlParams = new URLSearchParams(location.search);
  const urlFilter = urlParams.get('filter');
  const urlId     = urlParams.get('id');
  if (urlFilter) currentFilter = urlFilter;

  // ---- Filter tab click ----
  document.getElementById('filter-tabs').addEventListener('click', (e) => {
    const tab = e.target.closest('.filter-tab');
    if (!tab) return;
    currentFilter = tab.dataset.filter;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderBookings();
  });

  // Activate tab matching URL param
  if (urlFilter) {
    document.querySelectorAll('.filter-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.filter === urlFilter);
    });
  }

  // ---- Search ----
  let searchTimer;
  document.getElementById('search-input').addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      currentSearch = e.target.value.trim().toLowerCase();
      renderBookings();
    }, 200);
  });

  // ---- Load bookings (real-time) ----
  subscribeBookings();

  function subscribeBookings() {
    if (unsubscribe) unsubscribe();
    const bookingsRef = collection(db, 'clients', clientId, 'bookings');
    const q = query(bookingsRef, orderBy('createdAt', 'desc'), limit(200));
    unsubscribe = onSnapshot(q, (snap) => {
      allBookings = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderBookings();
      // If a booking is open in the modal, refresh it
      if (currentBooking) {
        const updated = allBookings.find(b => b.id === currentBooking.id);
        if (updated) currentBooking = updated;
      }
      // Deep-link: open a specific booking from URL
      if (urlId && !document.getElementById('modal-backdrop').classList.contains('open')) {
        const target = allBookings.find(b => b.id === urlId);
        if (target) openModal(target);
      }
    }, (err) => {
      console.error('Bookings listener error:', err);
      showError('Failed to load bookings. Please refresh the page.');
    });
  }

  // ---- Render the table ----
  function renderBookings() {
    let filtered = allBookings;

    // Status filter
    if (currentFilter !== 'all') {
      filtered = filtered.filter(b => b.status === currentFilter);
    }

    // Search filter
    if (currentSearch) {
      filtered = filtered.filter(b => {
        const s = currentSearch;
        return (
          (b.referenceNo || '').toLowerCase().includes(s) ||
          (b.guestName   || '').toLowerCase().includes(s) ||
          (b.guestEmail  || '').toLowerCase().includes(s) ||
          (b.guestPhone  || '').toLowerCase().includes(s) ||
          (b.unitName    || '').toLowerCase().includes(s)
        );
      });
    }

    // Update count badge
    document.getElementById('count-badge').textContent = `${filtered.length} booking${filtered.length !== 1 ? 's' : ''}`;

    const container = document.getElementById('bookings-container');

    if (filtered.length === 0) {
      container.innerHTML = `<div class="empty-state">
        <i class="fa-solid fa-calendar-xmark"></i>
        <p>${currentSearch ? 'No bookings match your search.' : 'No bookings in this category.'}</p>
      </div>`;
      return;
    }

    container.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Reference</th>
              <th>Guest</th>
              <th>Room</th>
              <th>Check-in</th>
              <th>Check-out</th>
              <th>Total</th>
              <th>Payment</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="bookings-tbody"></tbody>
        </table>
      </div>
    `;

    document.getElementById('bookings-tbody').innerHTML = filtered.map(b => `
      <tr data-id="${esc(b.id)}">
        <td><span style="font-family:monospace;font-size:12px;font-weight:600;">${esc(b.referenceNo || b.id)}</span></td>
        <td>
          <div style="font-weight:600;">${esc(b.guestName || '—')}</div>
          <div style="font-size:12px;color:var(--muted);">${esc(b.guestEmail || '')}</div>
        </td>
        <td>${esc(b.unitName || '—')}</td>
        <td style="white-space:nowrap;">${esc(b.checkIn || '—')}</td>
        <td style="white-space:nowrap;">${esc(b.checkOut || '—')}</td>
        <td style="white-space:nowrap;font-weight:600;">${formatCurrency(b.grandTotal)}</td>
        <td>${esc(b.paymentMethod || '—')}</td>
        <td>${statusBadge(b.status)}</td>
      </tr>
    `).join('');

    document.querySelectorAll('#bookings-tbody tr').forEach(row => {
      row.addEventListener('click', () => {
        const booking = allBookings.find(b => b.id === row.dataset.id);
        if (booking) openModal(booking);
      });
    });
  }

  // ---- Modal ----
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-backdrop').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modal-backdrop')) closeModal();
  });

  function openModal(booking) {
    currentBooking = booking;
    renderModal(booking);
    document.getElementById('modal-backdrop').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modal-backdrop').classList.remove('open');
    document.body.style.overflow = '';
    currentBooking = null;
  }

  function renderModal(b) {
    // Header
    document.getElementById('modal-ref').textContent = b.referenceNo || b.id;
    document.getElementById('modal-created').textContent = 'Created ' + formatDateTime(b.createdAt);
    document.getElementById('modal-status-badge').innerHTML = statusBadge(b.status);

    // Body
    const addons = (b.addons || []).map(a =>
      `<div class="price-row"><span class="label">${esc(a.name || 'Add-on')}</span><span class="value">${formatCurrency(a.price || 0)}</span></div>`
    ).join('');

    const screenshotHtml = (() => {
      if (!b.screenshotUrl) return '<p style="color:var(--muted);font-size:13px;">No screenshot uploaded.</p>';
      if (!isSafeImageUrl(b.screenshotUrl)) return '<p style="color:var(--muted);font-size:13px;">Screenshot URL invalid.</p>';
      return `<div class="screenshot-preview">
        <a href="${esc(b.screenshotUrl)}" target="_blank" rel="noopener" title="View full size">
          <img src="${esc(b.screenshotUrl)}" alt="Payment screenshot" onerror="this.parentElement.innerHTML='<p style=color:var(--muted)>Could not load image.</p>'">
        </a>
        <div style="margin-top:6px;">
          <a href="${esc(b.screenshotUrl)}" target="_blank" rel="noopener" class="btn btn-sm btn-ghost">
            <i class="fa-solid fa-up-right-from-square"></i> Open Full Size
          </a>
        </div>
      </div>`;
    })();

    document.getElementById('modal-body').innerHTML = `
      <!-- Guest info -->
      <div class="modal-section">
        <div class="modal-section-title">Guest Information</div>
        <div class="detail-grid">
          <div class="detail-item"><div class="detail-label">Name</div><div class="detail-value">${esc(b.guestName || '—')}</div></div>
          <div class="detail-item"><div class="detail-label">Email</div><div class="detail-value">${esc(b.guestEmail || '—')}</div></div>
          <div class="detail-item"><div class="detail-label">Phone</div><div class="detail-value">${esc(b.guestPhone || '—')}</div></div>
          <div class="detail-item"><div class="detail-label">Guests</div><div class="detail-value">${esc(b.numGuests || '—')}</div></div>
        </div>
      </div>

      <!-- Stay details -->
      <div class="modal-section">
        <div class="modal-section-title">Stay Details</div>
        <div class="detail-grid">
          <div class="detail-item"><div class="detail-label">Room</div><div class="detail-value" style="font-weight:700;">${esc(b.unitName || '—')}</div></div>
          <div class="detail-item"><div class="detail-label">Nights</div><div class="detail-value">${esc(b.nights || '—')}</div></div>
          <div class="detail-item"><div class="detail-label">Check-in</div><div class="detail-value">${esc(b.checkIn || '—')}</div></div>
          <div class="detail-item"><div class="detail-label">Check-out</div><div class="detail-value">${esc(b.checkOut || '—')}</div></div>
        </div>
      </div>

      <!-- Price breakdown -->
      <div class="modal-section">
        <div class="modal-section-title">Pricing</div>
        <div class="price-breakdown">
          <div class="price-row"><span class="label">Base total (${esc(b.nights)} night${b.nights !== 1 ? 's' : ''})</span><span class="value">${formatCurrency(b.baseTotal)}</span></div>
          ${b.extraGuestTotal > 0 ? `<div class="price-row"><span class="label">Extra guest fee</span><span class="value">${formatCurrency(b.extraGuestTotal)}</span></div>` : ''}
          ${addons}
          <div class="price-row total"><span class="label">Grand Total</span><span class="value">${formatCurrency(b.grandTotal)}</span></div>
          <div class="price-row" style="margin-top:8px;"><span class="label">Reservation Fee (paid now)</span><span class="value">${formatCurrency(b.reservationFee)}</span></div>
          <div class="price-row"><span class="label">Security Deposit (at check-in)</span><span class="value">${formatCurrency(b.securityDeposit)}</span></div>
          <div class="price-row"><span class="label">Balance Due at Check-in</span><span class="value fw-600">${formatCurrency(b.balanceDueAtCheckin)}</span></div>
        </div>
      </div>

      <!-- Payment -->
      <div class="modal-section">
        <div class="modal-section-title">Payment</div>
        <p style="font-size:13px;margin-bottom:12px;"><strong>Method:</strong> ${esc(b.paymentMethod || '—')}</p>
        ${screenshotHtml}
      </div>

      <!-- Admin note -->
      ${b.adminNote ? `<div class="modal-section">
        <div class="modal-section-title">Admin Note</div>
        <div style="background:#fff8e1;border-left:4px solid var(--warning);padding:12px 14px;border-radius:4px;font-size:13px;">${esc(b.adminNote)}</div>
      </div>` : ''}
    `;

    // Actions
    renderModalActions(b);
  }

  function renderModalActions(b) {
    const actionsEl = document.getElementById('modal-actions');

    if (b.status === 'pending_review') {
      actionsEl.innerHTML = `
        <button class="btn btn-success" id="action-confirm">
          <i class="fa-solid fa-circle-check"></i> Confirm Booking
        </button>
        <button class="btn btn-danger" id="action-reject-open">
          <i class="fa-solid fa-circle-xmark"></i> Reject Booking
        </button>
        <button class="btn btn-ghost" style="margin-left:auto;" onclick="closeModal()">Close</button>

        <!-- Reject panel (hidden initially) -->
        <div id="reject-panel" style="display:none;width:100%;padding-top:12px;border-top:1px solid var(--border);">
          <div class="form-group" style="margin-bottom:8px;">
            <label class="form-label">Rejection Reason <span class="required">*</span></label>
            <textarea class="form-control" id="reject-reason" rows="3" placeholder="Enter a reason — this will be shown to the guest…"></textarea>
          </div>
          <div style="display:flex;gap:8px;">
            <button class="btn btn-danger" id="action-reject-confirm"><i class="fa-solid fa-circle-xmark"></i> Send Rejection</button>
            <button class="btn btn-ghost" id="action-reject-cancel">Cancel</button>
          </div>
        </div>
      `;

      document.getElementById('action-confirm').addEventListener('click', () => handleConfirm(b));
      document.getElementById('action-reject-open').addEventListener('click', () => {
        document.getElementById('reject-panel').style.display = 'block';
        document.getElementById('action-reject-open').style.display = 'none';
        document.getElementById('reject-reason').focus();
      });
      document.getElementById('action-reject-cancel').addEventListener('click', () => {
        document.getElementById('reject-panel').style.display = 'none';
        document.getElementById('action-reject-open').style.display = 'inline-flex';
        document.getElementById('reject-reason').value = '';
      });
      document.getElementById('action-reject-confirm').addEventListener('click', () => {
        const reason = document.getElementById('reject-reason').value.trim();
        if (!reason) { showToast('Please enter a rejection reason.', 'error'); return; }
        handleReject(b, reason);
      });

    } else if (b.status === 'confirmed') {
      actionsEl.innerHTML = `
        <button class="btn btn-ghost" style="color:var(--danger);border-color:var(--danger);" id="action-cancel-open">
          <i class="fa-solid fa-ban"></i> Cancel Booking
        </button>
        <button class="btn btn-ghost" style="margin-left:auto;" onclick="closeModal()">Close</button>

        <div id="cancel-panel" style="display:none;width:100%;padding-top:12px;border-top:1px solid var(--border);">
          <div style="background:#fee2e2;border-radius:6px;padding:12px 14px;font-size:13px;color:#991b1b;margin-bottom:12px;">
            <strong>Are you sure?</strong> This will cancel a confirmed booking and notify the guest by email.
          </div>
          <div class="form-group" style="margin-bottom:8px;">
            <label class="form-label">Cancellation Reason (optional)</label>
            <textarea class="form-control" id="cancel-reason" rows="2" placeholder="Reason for cancellation (optional)…"></textarea>
          </div>
          <div style="display:flex;gap:8px;">
            <button class="btn btn-danger" id="action-cancel-confirm"><i class="fa-solid fa-ban"></i> Yes, Cancel Booking</button>
            <button class="btn btn-ghost" id="action-cancel-cancel">Keep Booking</button>
          </div>
        </div>
      `;

      document.getElementById('action-cancel-open').addEventListener('click', () => {
        document.getElementById('cancel-panel').style.display = 'block';
        document.getElementById('action-cancel-open').style.display = 'none';
      });
      document.getElementById('action-cancel-cancel').addEventListener('click', () => {
        document.getElementById('cancel-panel').style.display = 'none';
        document.getElementById('action-cancel-open').style.display = 'inline-flex';
      });
      document.getElementById('action-cancel-confirm').addEventListener('click', () => {
        const reason = document.getElementById('cancel-reason').value.trim();
        handleCancel(b, reason);
      });

    } else {
      actionsEl.innerHTML = `<button class="btn btn-ghost" style="margin-left:auto;" onclick="closeModal()">Close</button>`;
    }
  }

  // ---- API calls ----
  async function handleConfirm(booking) {
    const btn = document.getElementById('action-confirm');
    if (!btn) return;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner" style="width:14px;height:14px;border-width:2px;"></span> Confirming…';

    try {
      const res = await fetch('/.netlify/functions/send-confirm', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ clientId, bookingId: booking.id }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Confirmation failed');
      showToast('Booking confirmed. Confirmation email sent to guest.', 'success');
      closeModal();
    } catch (err) {
      showToast(err.message, 'error');
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-circle-check"></i> Confirm Booking'; }
    }
  }

  async function handleReject(booking, reason) {
    const btn = document.getElementById('action-reject-confirm');
    if (!btn) return;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner" style="width:14px;height:14px;border-width:2px;"></span> Sending…';

    try {
      const res = await fetch('/.netlify/functions/send-reject', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ clientId, bookingId: booking.id, adminNote: reason }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Rejection failed');
      showToast('Booking rejected. Guest has been notified by email.', 'success');
      closeModal();
    } catch (err) {
      showToast(err.message, 'error');
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-circle-xmark"></i> Send Rejection'; }
    }
  }

  async function handleCancel(booking, reason) {
    const btn = document.getElementById('action-cancel-confirm');
    if (!btn) return;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner" style="width:14px;height:14px;border-width:2px;"></span> Cancelling…';

    try {
      const res = await fetch('/.netlify/functions/send-cancel', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ clientId, bookingId: booking.id, adminNote: reason || undefined }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Cancellation failed');
      showToast('Booking cancelled. Guest has been notified by email.', 'success');
      closeModal();
    } catch (err) {
      showToast(err.message, 'error');
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-ban"></i> Yes, Cancel Booking'; }
    }
  }

  // ---- Helpers ----
  function isSafeImageUrl(url) {
    try {
      const u = new URL(url);
      return u.hostname === 'res.cloudinary.com' || u.hostname.endsWith('.cloudinary.com');
    } catch { return false; }
  }

  function statusBadge(status) {
    const map = {
      pending_review: ['badge-pending',   'Pending Review'],
      confirmed:      ['badge-confirmed', 'Confirmed'],
      rejected:       ['badge-rejected',  'Rejected'],
      cancelled:      ['badge-cancelled', 'Cancelled'],
      expired:        ['badge-expired',   'Expired'],
    };
    const [cls, label] = map[status] || ['badge-cancelled', status || '—'];
    return `<span class="badge ${cls}">${label}</span>`;
  }

  function formatCurrency(n) {
    if (n === undefined || n === null || n === '') return '—';
    return '₱' + Number(n).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function formatDateTime(ts) {
    if (!ts) return '—';
    try {
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleString('en-PH', { timeZone: 'Asia/Manila', month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    } catch { return '—'; }
  }

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg, type = 'info') {
    const tc = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    const icons = { success: 'fa-circle-check', error: 'fa-circle-exclamation', info: 'fa-circle-info' };
    t.innerHTML = `<i class="fa-solid ${icons[type] || icons.info}"></i> ${esc(msg)}`;
    tc.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; setTimeout(() => t.remove(), 300); }, 4000);
  }

  // Expose closeModal to inline onclick
  window.closeModal = closeModal;
</script>
</body>
</html>
